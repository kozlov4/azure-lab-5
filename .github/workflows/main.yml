name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Direct Docker Login
      run: docker login aquacoreregistry2026.azurecr.io -u aquacoreregistry2026 -p ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Docker image
      run: |
        docker build -t aquacoreregistry2026.azurecr.io/aquacoreapp:latest .
        docker push aquacoreregistry2026.azurecr.io/aquacoreapp:latest
